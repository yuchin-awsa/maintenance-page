<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンテナンス中 | Personal OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* Apple風のミニマルなCSSリセットと基本設定 */
        :root {
            --apple-bg: #f5f5f7; /* 薄いグレーの背景 */
            --apple-text: #1d1d1f; /* 濃いグレーのテキスト */
            --apple-sub-text: #6e6e73; /* 薄いグレーのサブテキスト */
            --apple-blue: #0071e3; /* アクセントの青 */
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            letter-spacing: -0.015em;
        }

        /* メインコンテナ */
        .container {
            padding: 20px;
            max-width: 680px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* アニメーション */
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        /* メインの見出し */
        h1 {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
            margin: 0 0 16px 0;
            letter-spacing: -0.015em;
        }
        
        /* モバイル対応：見出しサイズを調整 */
        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }
        }

        /* サブテキスト（説明文） */
        .description {
            font-size: 21px;
            font-weight: 400;
            line-height: 1.381;
            color: var(--apple-sub-text);
            margin: 0 0 32px 0;
            letter-spacing: -0.011em;
        }
        
        /* 連絡先リンク */
        .contact {
            font-size: 19px;
            font-weight: 400;
            color: var(--apple-blue);
            text-decoration: none;
        }

        .contact:hover {
            text-decoration: underline;
        }

        /* フッター */
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: var(--apple-sub-text);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ただいまメンテナンス中です。</h1>
        
        <p class="description">
            Personal OSをご利用いただき、ありがとうございます。<br>
            より快適なサービスを提供するため、現在システムメンテナンスを実施しております。<br>
            ご不便をおかけいたしますが、何卒ご理解いただきますようお願い申し上げます。
        </p>
        
        </div>

    <footer>
        &copy; 2024 awsa-inotek. All rights reserved.
    </footer>
</body>
</html>
